<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大學生存指南</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow circle-1"></div><div class="bg-glow circle-2"></div>
  <div class="app-container">
    <button id="sound-toggle" class="sound-btn"><span class="material-icons-round">volume_up</span></button>

    <section id="start-screen" class="screen active-screen">
      <div class="logo-area"><span class="logo-icon material-icons-round">school</span><h1>大學生存指南</h1><p class="subtitle">30 Days Campus Survival Challenge</p></div>
      <div class="glass-panel start-card">
        <h2>建立你的大學生檔案</h2>
        <div class="input-group"><label for="player-name">學生姓名</label><input id="player-name" type="text" maxlength="8" value="小明" /></div>
        <div><label>選擇學生性別</label><div class="gender-grid"><button class="gender-btn active" data-gender="male"><span class="material-icons-round">man</span>男學生</button><button class="gender-btn" data-gender="female"><span class="material-icons-round">woman</span>女學生</button></div></div>
        <div><label>選擇學生外觀</label><div class="avatar-grid"><button class="avatar-option active" data-avatar="1"><div id="avatar-preview-1"></div></button><button class="avatar-option" data-avatar="2"><div id="avatar-preview-2"></div></button><button class="avatar-option" data-avatar="3"><div id="avatar-preview-3"></div></button></div></div>
        <div><label>選擇性格天賦</label><div class="trait-grid"><div class="trait-card active" data-trait="optimist"><span class="material-icons-round">sentiment_very_satisfied</span><h3>樂天派</h3><p>初始心情 +20</p></div><div class="trait-card" data-trait="studious"><span class="material-icons-round">history_edu</span><h3>勤奮型</h3><p>初始成績 +15</p></div><div class="trait-card" data-trait="frugal"><span class="material-icons-round">savings</span><h3>省錢達人</h3><p>初始金錢 +$2,000</p></div><div class="trait-card" data-trait="healthy"><span class="material-icons-round">favorite</span><h3>健康寶寶</h3><p>初始體力 +20</p></div></div></div>
        <button id="start-game-btn" class="btn btn-primary btn-large">開啟大學生活 <span class="material-icons-round">arrow_forward</span></button>
      </div>
    </section>

    <section id="game-screen" class="screen">
      <header class="game-header glass-panel">
        <div class="student-profile"><div id="display-avatar-container" class="profile-avatar-container"></div><div><div id="display-name" class="student-name">小明</div><div id="display-trait" class="badge optimist">樂天派</div></div></div>
        <div class="date-container"><div class="date-header-row"><b>第 <span id="current-day">1</span> 天 / 30</b><span id="semester-text" class="semester-stage">期中考倒數 14 天</span></div><div id="calendar-grid" class="calendar-widget"></div></div>
      </header>
      <main class="game-grid">
        <aside class="stats-panel glass-panel"><h3>個人狀態</h3><div id="stats-box"></div><h4>持有增益與衣裝</h4><div id="buffs-container" class="buffs-list"></div><h4>隨身購物籃（點擊食用）</h4><div id="basket-container" class="buffs-list"></div></aside>
        <section class="action-panel glass-panel"><div class="section-header"><h3>今日行動選擇</h3><span>按下後會改變數值與天數</span></div><div class="action-grid" id="action-grid"></div></section>
        <section class="shop-panel glass-panel"><div class="section-header"><h3>校園合作社</h3><div class="shop-tabs"><button class="shop-tab active" data-tab="items">被動增益</button><button class="shop-tab" data-tab="food">美味餐點</button><button class="shop-tab" data-tab="clothes">服裝更換</button></div></div><div id="shop-grid" class="shop-grid"></div></section>
        <section class="log-panel glass-panel"><div class="section-header"><h3>每日生活日誌</h3><button id="clear-logs" class="btn-clear"><span class="material-icons-round">delete_sweep</span></button></div><div id="log-list" class="log-list"></div></section>
      </main>
    </section>

    <div id="quiz-modal" class="modal-overlay"><div class="modal-content glass-panel"><h2>今日隨堂測驗</h2><p id="quiz-question"></p><div id="quiz-options" class="modal-actions"></div></div></div>
    <section id="ending-screen" class="screen"><div class="glass-panel ending-card"><h1>挑戰結束</h1><h2 id="ending-name"></h2><p id="ending-description"></p><button id="restart-game-btn" class="btn btn-primary btn-large">重新挑戰</button></div></section>
  </div>
  <script src="script.js"></script>
</body>
</html>
